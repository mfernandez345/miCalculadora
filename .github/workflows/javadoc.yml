name: Generar JavaDoc y publicar en GitHub Pages

on:
  push:
    branches: [ "main" ]

jobs:
  javadoc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Descargar JavaFX 21
        run: |
          wget https://download2.gluonhq.com/openjfx/21.0.1/openjfx-21.0.1_linux-x64_bin-sdk.zip
          unzip openjfx-21.0.1_linux-x64_bin-sdk.zip
          mv javafx-sdk-21.0.1 javafx-sdk

      - name: Descargar dependencias JUnit 5
        run: |
          mkdir -p junit
          wget https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-api/5.10.0/junit-jupiter-api-5.10.0.jar -O junit/junit-jupiter-api.jar
          wget https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-engine/5.10.0/junit-jupiter-engine-5.10.0.jar -O junit/junit-jupiter-engine.jar
          wget https://repo1.maven.org/maven2/org/apiguardian/apiguardian-api/1.1.2/apiguardian-api-1.1.2.jar -O junit/apiguardian-api.jar
          wget https://repo1.maven.org/maven2/org/opentest4j/opentest4j/1.3.0/opentest4j-1.3.0.jar -O junit/opentest4j.jar

      - name: Generar JavaDoc (main + test)
        run: |
          mkdir -p javadoc
          javadoc \
            --module-path javafx-sdk/lib \
            --add-modules javafx.controls,javafx.fxml \
            -classpath "junit/*" \
            -d javadoc \
            $(find src -name "*.java") \
            $(find test -name "*.java")

      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: javadoc
