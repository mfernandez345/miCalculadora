name: Generar JavaDoc y publicar en GitHub Pages

on:
  push:
    branches: [ "main" ]

jobs:
  javadoc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Descargar JavaFX 21
        run: |
          wget https://download2.gluonhq.com/openjfx/21.0.1/openjfx-21.0.1_linux-x64_bin-sdk.zip
          unzip openjfx-21.0.1_linux-x64_bin-sdk.zip
          mv javafx-sdk-21.0.1 javafx-sdk

      - name: Generar JavaDoc
        run: |
          mkdir -p javadoc
          javadoc \
            --module-path javafx-sdk/lib \
            --add-modules javafx.controls,javafx.fxml \
            -d javadoc \
            $(find src -name "*.java")

      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: javadoc