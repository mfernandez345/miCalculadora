name: JavaFX + JUnit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install JavaFX
        run: sudo apt-get update && sudo apt-get install -y openjfx

      - name: Download JUnit 5
        run: |
          mkdir -p lib
          curl -L -o lib/junit-platform-console-standalone.jar \
            https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.1/junit-platform-console-standalone-1.10.1.jar

      - name: Compile source files
        run: |
          mkdir -p out
          javac \
            --module-path /usr/share/openjfx/lib \
            --add-modules javafx.controls,javafx.fxml \
            -cp lib/junit-platform-console-standalone.jar \
            -d out \
            $(find src -name "*.java")

      - name: Compile tests
        run: |
          mkdir -p out_test
          javac \
            -cp "out:lib/junit-platform-console-standalone.jar" \
            -d out_test \
            $(find test -name "*.java")

      - name: Run tests
        run: |
          java \
            --module-path /usr/share/openjfx/lib \
            --add-modules javafx.controls,javafx.fxml \
            -cp "out:out_test:lib/junit-platform-console-standalone.jar" \
            org.junit.platform.console.ConsoleLauncher \
            --scan-classpath
